name: flutter_native_html_to_pdf
description: A Flutter plugin that uses native WebView (Android WebView / iOS WKWebView) to render HTML and convert it to a high-quality PDF file.
version: 3.1.0
homepage: https://github.com/Pisey-Nguon
repository: https://github.com/Pisey-Nguon/flutter_native_html_to_pdf

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.digitaltalend.flutter_native_html_to_pdf
        pluginClass: FlutterNativeHtmlToPdfPlugin
      ios:
        pluginClass: FlutterNativeHtmlToPdfPlugin
      web:
        pluginClass: FlutterNativeHtmlToPdfWeb
        fileName: flutter_native_html_to_pdf_web.dart
